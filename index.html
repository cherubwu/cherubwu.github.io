---
layout: default
title: Home
---

<div class="feed">
  {% for post in paginator.posts %}
    <article class="card">
      <h2 class="card-title">
        <a href="{{ post.url }}">{{ post.title }}</a>
      </h2>
      <div class="card-meta">{{ post.date | date: "%b %d, %Y" }}</div>
      <div class="card-excerpt">
        {{ post.excerpt | strip_html }}
      </div>
      <div class="card-actions">
        <a class="btn" href="{{ post.url }}">Read →</a>
      </div>
    </article>
  {% endfor %}
</div>

<nav class="pager">
  {% if paginator.next_page %}
    <a class="btn" href="{{ paginator.next_page_path }}">Older</a>
  {% endif %}
  {% if paginator.previous_page %}
    <a class="btn" href="{{ paginator.previous_page_path }}">Newer</a>
  {% endif %}
</nav>
